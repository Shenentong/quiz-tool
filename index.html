<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刷题工具 — Word 文档一键转刷题</title>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #f0f2f5; color: #1a1a2e; line-height: 1.6; min-height: 100vh;
}
.container { max-width: 820px; margin: 0 auto; padding: 16px; }

/* Header */
header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  color: #fff; padding: 20px 0; text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,.15);
}
header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -.5px; }
header p { font-size: .85rem; opacity: .7; margin-top: 4px; }

/* Upload Screen */
#uploadScreen { padding: 40px 0; }
.upload-area {
  background: #fff; border: 3px dashed #d1d5db; border-radius: 20px;
  padding: 60px 40px; text-align: center; cursor: pointer;
  transition: all .2s; max-width: 600px; margin: 0 auto;
}
.upload-area:hover, .upload-area.dragover { border-color: #4f46e5; background: #f8faff; }
.upload-area .icon { font-size: 3rem; color: #4f46e5; margin-bottom: 12px; }
.upload-area h2 { font-size: 1.3rem; color: #1a1a2e; margin-bottom: 8px; }
.upload-area p { color: #6b7280; font-size: .9rem; }
.upload-area .hint { margin-top: 12px; font-size: .8rem; color: #9ca3af; }
.upload-area input[type="file"] { display: none; }
.upload-area .supported { margin-top: 20px; font-size: .75rem; color: #9ca3af; }

/* Format Guide */
.steps { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
.step { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 99px; font-size: .85rem; font-weight: 500; color: #9ca3af; background: #f3f4f6; }
.step.active { background: #eef2ff; color: #4f46e5; }
.step .num { width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; background: #d1d5db; color: #fff; }
.step.active .num { background: #4f46e5; }
.upload-area-v2 {
  background: #fff; border: 3px dashed #d1d5db; border-radius: 20px;
  padding: 50px 40px; text-align: center; cursor: pointer;
  transition: all .2s; max-width: 560px; margin: 0 auto;
}
.upload-area-v2:hover, .upload-area-v2.dragover { border-color: #4f46e5; background: #f8faff; }
.upload-area-v2 .icon { width: 64px; height: 64px; border-radius: 16px; background: #eef2ff; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 1.6rem; }
.upload-area-v2 h2 { font-size: 1.2rem; color: #1a1a2e; margin-bottom: 4px; }
.upload-area-v2 p { color: #6b7280; font-size: .9rem; }
.upload-area-v2 .hint { margin-top: 12px; font-size: .8rem; color: #9ca3af; }
.upload-area-v2 input[type="file"] { display: none; }
.demo-section { text-align: center; margin-top: 20px; }
.demo-section button {
  padding: 10px 24px; border-radius: 10px; border: 2px solid #e5e7eb;
  font-size: .9rem; font-weight: 600; cursor: pointer; transition: all .15s;
  background: #fff; color: #374151;
}
.demo-section button:hover { border-color: #4f46e5; color: #4f46e5; background: #f8faff; }
.features { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 24px; max-width: 640px; margin-left: auto; margin-right: auto; }
.feature-card { background: #fff; border-radius: 12px; padding: 16px 20px; flex: 1; min-width: 130px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.feature-card .icon { font-size: 1.5rem; margin-bottom: 6px; }
.feature-card h4 { font-size: .85rem; color: #1a1a2e; margin-bottom: 2px; }
.feature-card p { font-size: .75rem; color: #9ca3af; }

/* Loading */
.loading-area { text-align: center; padding: 60px 20px; display: none; }
.spinner { width: 40px; height: 40px; border: 4px solid #e5e7eb; border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-area p { color: #6b7280; font-size: .9rem; }

/* Error */
.error-area { text-align: center; padding: 40px 20px; display: none; }
.error-area .msg { background: #fef2f2; color: #991b1b; padding: 16px 20px; border-radius: 12px; border: 1px solid #fecaca; display: inline-block; max-width: 500px; }

/* Parsed Preview */
.preview-area { display: none; background: #fff; border-radius: 14px; padding: 20px 24px; margin-bottom: 20px; box-shadow: 0 1px 6px rgba(0,0,0,.08); }
.preview-area h3 { font-size: 1rem; margin-bottom: 8px; }
.preview-area .summary { font-size: .85rem; color: #6b7280; margin-bottom: 12px; }
.preview-area .actions { display: flex; gap: 10px; flex-wrap: wrap; }
.preview-area button {
  padding: 10px 24px; border-radius: 10px; border: none;
  font-size: .9rem; font-weight: 600; cursor: pointer; transition: all .15s;
}
.preview-area .btn-start { background: #4f46e5; color: #fff; }
.preview-area .btn-start:hover { background: #4338ca; }
.preview-area .btn-reupload { background: #f3f4f6; color: #374151; }
.preview-area .btn-reupload:hover { background: #e5e7eb; }

/* Toolbar */
.toolbar {
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  background: #fff; padding: 14px 20px; border-radius: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08); margin: 20px 0;
}
.toolbar .file-name { font-size: .85rem; color: #374151; font-weight: 600; margin-right: auto; }
.toolbar .stats { font-size: .85rem; color: #6b7280; }
.toolbar button {
  padding: 8px 16px; border-radius: 8px; border: 1px solid #d1d5db;
  font-size: .85rem; cursor: pointer; transition: all .15s; background: #fff;
}
.toolbar button.primary { background: #1a1a2e; color: #fff; border: none; font-weight: 600; }
.toolbar button.primary:hover { background: #16213e; }
.toolbar button.danger { background: #ef4444; color: #fff; border: none; }
.toolbar button.danger:hover { background: #dc2626; }

/* Progress */
.progress-wrap { background: #e5e7eb; border-radius: 99px; height: 6px; margin-bottom: 20px; overflow: hidden; }
.progress-bar { height: 100%; background: linear-gradient(90deg, #4f46e5, #6366f1); border-radius: 99px; transition: width .3s ease; width: 0%; }

/* Question Card */
.question-card {
  background: #fff; border-radius: 14px; padding: 24px 28px;
  box-shadow: 0 1px 6px rgba(0,0,0,.08); margin-bottom: 16px;
  animation: fadeIn .25s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.q-number { font-size: .8rem; color: #9ca3af; margin-bottom: 4px; font-weight: 500; }
.q-badge {
  display: inline-block; padding: 3px 10px; border-radius: 99px;
  font-size: .75rem; font-weight: 600; margin-bottom: 10px;
}
.badge-tf { background: #dbeafe; color: #1e40af; }
.badge-mc { background: #d1fae5; color: #065f46; }
.badge-ma { background: #fef3c7; color: #92400e; }
.badge-fill { background: #f3e8ff; color: #6b21a8; }
.q-text { font-size: 1rem; font-weight: 500; margin-bottom: 16px; line-height: 1.7; }
.q-text .en { color: #6b7280; font-weight: 400; font-size: .9rem; display: block; margin-top: 6px; }

/* Options */
.options { display: flex; flex-direction: column; gap: 8px; }
.option {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 16px; border-radius: 10px;
  border: 2px solid #e5e7eb; cursor: pointer;
  transition: all .15s; user-select: none;
}
.option:hover { border-color: #93c5fd; background: #f8fafc; }
.option.selected { border-color: #4f46e5; background: #eef2ff; }
.option.correct { border-color: #22c55e; background: #f0fdf4; }
.option.wrong { border-color: #ef4444; background: #fef2f2; }
.option.show-correct { border-color: #22c55e; background: #f0fdf4; }
.option input[type="radio"], .option input[type="checkbox"] { margin-top: 3px; width: 18px; height: 18px; flex-shrink: 0; }
.option .letter { font-weight: 600; color: #4f46e5; flex-shrink: 0; min-width: 20px; }

/* Fill input */
.fill-input {
  width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 10px;
  font-size: 1rem; outline: none; transition: border .15s; font-family: inherit;
}
.fill-input:focus { border-color: #4f46e5; }
.fill-input.correct { border-color: #22c55e; background: #f0fdf4; }
.fill-input.wrong { border-color: #ef4444; background: #fef2f2; }

/* Actions */
.actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
.actions button {
  padding: 10px 24px; border-radius: 10px; border: none;
  font-size: .9rem; font-weight: 600; cursor: pointer; transition: all .15s;
}
.actions .btn-submit { background: #4f46e5; color: #fff; }
.actions .btn-submit:hover { background: #4338ca; }
.actions .btn-next { background: #1a1a2e; color: #fff; }
.actions .btn-next:hover { background: #16213e; }
.actions .btn-reset { background: #f3f4f6; color: #374151; }
.actions .btn-reset:hover { background: #e5e7eb; }

/* Feedback */
.feedback {
  margin-top: 16px; padding: 14px 18px; border-radius: 10px;
  font-size: .9rem; font-weight: 500; display: none;
}
.feedback.show { display: block; }
.feedback.correct-fb { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
.feedback.wrong-fb { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

/* Summary */
.summary-wrap { text-align: center; padding: 20px 0; }
.summary-wrap h2 { font-size: 1.6rem; margin-bottom: 4px; }
.summary-wrap .score { font-size: 3.5rem; font-weight: 800; color: #4f46e5; margin: 8px 0; }
.summary-wrap .sub { color: #6b7280; font-size: 1rem; }
.summary-wrap .detail { margin-top: 8px; color: #6b7280; font-size: .9rem; }
.summary-wrap .breakdown { margin-top: 24px; text-align: left; max-height: 400px; overflow-y: auto; }
.summary-wrap .breakdown-item {
  padding: 8px 12px; font-size: .85rem; border-bottom: 1px solid #f3f4f6;
  display: flex; align-items: flex-start; gap: 8px;
}
.summary-wrap .breakdown-item.wrong-item { background: #fef2f2; border-radius: 6px; margin: 4px 0; }
.summary-wrap .breakdown-item .q-preview { flex: 1; color: #374151; }
.summary-wrap .breakdown-item .q-preview .en { color: #9ca3af; font-size: .75rem; }

/* Filter label styles */
.type-filter-label { transition: opacity .15s, transform .1s; }
.type-filter-label:hover { opacity: .85 !important; transform: translateY(-1px); }
.type-filter-label:active { transform: translateY(0); }

/* Responsive */
@media (max-width: 600px) {
  .container { padding: 10px; }
  .question-card { padding: 16px; }
  .upload-area { padding: 40px 20px; }
  .toolbar { flex-direction: column; align-items: stretch; }
  .toolbar .file-name { margin-right: 0; }
  .toolbar .filters { flex-wrap: wrap; }
  .preview-area .actions { flex-direction: column; }
}

/* Debug */
.debug-toggle { text-align: center; margin-top: 12px; }
.debug-toggle button { padding: 6px 14px; border-radius: 6px; border: 1px solid #d1d5db; font-size: .75rem; cursor: pointer; background: #fff; color: #6b7280; }
.debug-area { display: none; margin-top: 12px; padding: 16px; background: #1a1a2e; color: #e5e7eb; border-radius: 10px; font-size: .75rem; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow: auto; }

/* Parse detail */
.parsed-list { margin-top: 12px; max-height: 300px; overflow-y: auto; }
.parsed-item { padding: 6px 0; border-bottom: 1px solid #f3f4f6; font-size: .8rem; display: flex; gap: 8px; align-items: flex-start; }
.parsed-item .num { color: #4f46e5; font-weight: 600; min-width: 30px; }
.parsed-item .type-badge { font-size: .65rem; padding: 1px 6px; border-radius: 4px; font-weight: 600; }
.parsed-item .preview { color: #6b7280; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
<body>

<header>
  <h1> 刷题工具</h1>
  <p>上传 Word 文档，自动生成刷题页面</p>
</header>

<div class="container">

  <!-- ============ UPLOAD SCREEN ============ -->
  <div id="uploadScreen">
    <!-- Step indicator -->
    <div class="steps">
      <div class="step active"><span class="num">1</span> 上传文档</div>
      <span style="color:#d1d5db;">→</span>
      <div class="step"><span class="num">2</span> 预览题目</div>
      <span style="color:#d1d5db;">→</span>
      <div class="step"><span class="num">3</span> 开始刷题</div>
    </div>

    <!-- Upload area -->
    <div class="upload-area-v2" id="dropZone">
      <div class="icon">📄</div>
      <h2>上传复习文档</h2>
      <p>把你的 Word 复习资料拖到这里，或点击选择文件</p>
      <div class="hint">支持 .docx 格式 · 文档仅在本地处理，不会上传到任何服务器</div>
      <input type="file" id="fileInput" accept=".docx">
    </div>

    <!-- Try demo & Wrong book -->
    <div class="demo-section">
      <button onclick="loadDemo()">🎯 试试示例题目</button>
      <button id="wrongBtn" onclick="startWrongQuiz()" style="display:none;border-color:#ef4444;color:#ef4444;">📕 错题本 <span id="wrongCount"></span></button>
    </div>

    <!-- Features -->
    <div class="features">
      <div class="feature-card">
        <div class="icon">✅</div>
        <h4>判断 / 单选 / 多选</h4>
        <p>自动识别多种题型</p>
      </div>
      <div class="feature-card">
        <div class="icon">🔀</div>
        <h4>随机打乱</h4>
        <p>题目和选项顺序随机</p>
      </div>
      <div class="feature-card">
        <div class="icon">📋</div>
        <h4>错题复习</h4>
        <p>自动收集错题反复刷</p>
      </div>
      <div class="feature-card">
        <div class="icon">🔒</div>
        <h4>本地运行</h4>
        <p>数据不上传任何服务器</p>
      </div>
    </div>
  </div>

  <!-- ============ LOADING ============ -->
  <div class="loading-area" id="loadingArea">
    <div class="spinner"></div>
    <p>正在解析文档...</p>
  </div>

  <!-- ============ ERROR ============ -->
  <div class="error-area" id="errorArea">
    <div class="msg" id="errorMsg"></div>
    <div style="margin-top:16px">
      <button onclick="showUpload()" style="padding:10px 24px;border-radius:10px;border:none;background:#4f46e5;color:#fff;font-size:.9rem;font-weight:600;cursor:pointer;">返回重新上传</button>
    </div>
  </div>

  <!-- ============ PREVIEW ============ -->
  <div class="preview-area" id="previewArea">
    <h3 id="previewTitle"> 文档解析完成</h3>
    <div class="summary" id="previewSummary"></div>
    <div class="parsed-list" id="parsedList"></div>
    <div class="actions" style="margin-top:16px;">
      <button class="btn-start" onclick="startQuiz()">开始刷题</button>
      <button class="btn-reupload" onclick="showUpload()">重新上传</button>
    </div>
  </div>

  <!-- ============ QUIZ SCREEN ============ -->
  <div id="quizScreen" style="display:none">
    <div class="toolbar">
      <span class="file-name" id="fileName"></span>
      <div class="filters" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
        <select id="quizFilter" style="padding:6px 10px;border-radius:8px;border:1px solid #d1d5db;font-size:.8rem;background:#fff;"></select>
        <span style="display:flex;gap:4px;" id="typeFilters">
          <label class="type-filter-label" data-type="tf" style="font-size:.75rem;cursor:pointer;padding:4px 8px;border-radius:6px;background:#dbeafe;color:#1e40af;font-weight:600;user-select:none;"><input type="checkbox" checked hidden> 判断</label>
          <label class="type-filter-label" data-type="mc" style="font-size:.75rem;cursor:pointer;padding:4px 8px;border-radius:6px;background:#d1fae5;color:#065f46;font-weight:600;user-select:none;"><input type="checkbox" checked hidden> 单选</label>
          <label class="type-filter-label" data-type="ma" style="font-size:.75rem;cursor:pointer;padding:4px 8px;border-radius:6px;background:#fef3c7;color:#92400e;font-weight:600;user-select:none;"><input type="checkbox" checked hidden> 多选</label>
          <label class="type-filter-label" data-type="fill" style="font-size:.75rem;cursor:pointer;padding:4px 8px;border-radius:6px;background:#f3e8ff;color:#6b21a8;font-weight:600;user-select:none;"><input type="checkbox" checked hidden> 填空</label>
        </span>
      </div>
      <span class="stats" id="statsDisplay">0 / 0</span>
      <button onclick="applyFilters()" class="primary" style="padding:6px 14px;font-size:.8rem;"> 筛选</button>
      <button onclick="shuffleAndRestart()" class="primary" id="btnShuffle"> 打乱</button>
      <button onclick="showUpload()" class="danger"> 退出</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div id="quizArea"></div>
    <!-- Summary will be rendered here when done -->
  </div>

</div>

<script>
// ===================================================================
// PARSER — 从 Word 文档文本中提取题目
// ===================================================================

function splitInlineOptions(line) {
  // Handle "A. xxx  B. xxx  C. xxx" on one line
  const parts = line.split(/\s{2,}(?=[A-Da-d][.、．\)])/);
  if (parts.length > 1) {
    return parts.map(p => {
      const m = p.match(/^([A-Da-d])[.、．\)]\s*(.*)/);
      return m ? { label: m[1].toUpperCase(), text: m[2].trim() } : null;
    }).filter(Boolean);
  }
  const parts2 = line.split(/\s{2,}(?=[A-Da-d]\s{2,})/);
  if (parts2.length > 1 && parts2[0].length < 10) {
    return parts2.map(p => {
      const m = p.match(/^([A-Da-d])\s{2,}(.*)/);
      return m ? { label: m[1].toUpperCase(), text: m[2].trim() } : null;
    }).filter(Boolean);
  }
  return null;
}

function parseQuestions(rawText) {
  const lines = rawText.split('\n');
  const questions = [];
  let current = null;
  let currentType = null;
  let currentQuiz = ''; // quiz/section name
  let qnum = 0;
  let inAlt = false;
  let pendingAnswer = null; // accumulate multi-line answers

  const clean = s => s.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F-\x9F]/g, '').trim();

  function flushPendingAnswer() {
    if (pendingAnswer && current) {
      current.rawAnswer = pendingAnswer;
      inAlt = false;
    }
    pendingAnswer = null;
  }

  function newQuestion(num, text) {
    inAlt = false;
    pendingAnswer = null;
    return { number: num, text: text, options: [], answer: null, type: currentType, rawAnswer: null, altText: '' };
  }

  function saveCurrent() {
    flushPendingAnswer();
    if (!current || !current.text.trim()) return;
    if (!current.type) {
      if (current.options.length === 2 && current.options.some(o =>
        /^(True|False|对|错|T|F|是|否|正确|错误|√|×)$/i.test(o.text.trim())
      )) {
        current.type = 'tf';
      } else if (current.options.length > 0) {
        current.type = 'mc';
      } else {
        current.type = 'fill';
      }
    }
    questions.push({
      id: questions.length + 1,
      number: current.number,
      type: current.type,
      quiz: currentQuiz,
      text: current.text.trim(),
      altText: current.altText.trim(),
      options: current.options,
      answer: current.answer,
      rawAnswer: current.rawAnswer
    });
  }

  for (let i = 0; i < lines.length; i++) {
    let line = clean(lines[i]);
    if (!line) { flushPendingAnswer(); continue; }

    // Separator lines
    if (/^[─━═▬█\-*=•○●❤️▶◆◇]{3,}$/.test(line)) { continue; }

    // Quiz/section detection (单元/章节)
    const quizMatch = line.match(/^(Quiz\s*\d+[—:\s][^█▬]{0,60}|第[一二三四五六七八九十百零]+[章节部分课]|Unit\s*\d+|Chapter\s*\d+)/i);
    if (quizMatch) {
      currentQuiz = quizMatch[1].trim();
      continue;
    }

    // Section headers — detect type
    const zhSec = line.match(/[一二三四五六七八九十百]+[、．.\s]\s*(判断|单选|多选|填空|简答|名词解释)/);
    if (zhSec) {
      const t = zhSec[1];
      if (t.includes('判断')) currentType = 'tf';
      else if (t.includes('单选')) currentType = 'mc';
      else if (t.includes('多选')) currentType = 'ma';
      else if (t.includes('填空')) currentType = 'fill';
      continue;
    }
    if (/True or False/i.test(line)) { currentType = 'tf'; continue; }
    if (/Multiple[-\s]Answer|多选题/i.test(line)) { currentType = 'ma'; continue; }
    if (/Multiple Choice|Single Choice|单选题/i.test(line)) { currentType = 'mc'; continue; }
    if (/Fill[\s-]in[\s-]the[\s-]Blank|填空题/i.test(line)) { currentType = 'fill'; continue; }
    if (/[█▬]/.test(line) && line.length > 8) continue;

    // --- Number detection ---
    const numMatch = line.match(/^(\d+)[、.．\)\s]?\s*/);
    if (numMatch) {
      flushPendingAnswer();
      const num = parseInt(numMatch[1]);
      const textAfter = line.slice(numMatch[0].length).trim();
      if (num !== qnum || !current) {
        saveCurrent();
        current = newQuestion(num, textAfter);
        qnum = num;
        inAlt = false;
      } else {
        // Same # — bilingual alt section starts
        inAlt = true;
        current.altText += (current.altText ? '\n' : '') + textAfter;
      }
      continue;
    }

    // --- Answer markers (check before inAlt and normal flow) ---
    if (/[✔✓√]/.test(line) || /^答案[：:]\s*/.test(line) || /^Answer[：:]\s*/i.test(line)) {
      if (current) {
        const afterCheck = line.replace(/[✔✓√]/g, '').replace(/^(答案|Answer)[：:]\s*/i, '').trim();
        if (afterCheck.length >= 1) {
          // Complete answer on one line
          current.rawAnswer = line;
          inAlt = false;
          pendingAnswer = null;
          continue;
        }
        // Bare ✔ — start pending answer accumulation
        pendingAnswer = line;
        continue;
      }
    }

    // --- Pending answer accumulation (multi-line answers like ✔\nFalse\n/\n错) ---
    if (pendingAnswer) {
      const isMore = line.length < 30 && !/^[A-E]/.test(line);
      if (isMore) {
        pendingAnswer += ' ' + line;
        continue;
      } else {
        flushPendingAnswer();
        // fall through
      }
    }

    // --- In alt section: just accumulate text ---
    if (inAlt && current) {
      current.altText += ' ' + line;
      continue;
    }

    // --- Options ---
    // First try: inline options on one line
    const inlineOpts = current ? splitInlineOptions(line) : null;
    if (inlineOpts && inlineOpts.length >= 2) {
      inlineOpts.forEach(o => current.options.push(o));
      continue;
    }
    const optMatch = line.match(/^([A-Ea-e])[、.．\)\s]\s*(.+)/);
    if (optMatch && current && !line.match(/^[A-Ea-e]\)\s*$/)) {
      current.options.push({ label: optMatch[1].toUpperCase(), text: optMatch[2].trim() });
      continue;
    }

    // --- Fallback: append to question text ---
    if (current && line.length > 1) {
      current.text += ' ' + line;
    }
  }

  saveCurrent();

  // Post-process
  questions.forEach(q => {
    parseAnswer(q);
    finalizeType(q);
    q.text = q.text.replace(/^[▪▸➢\s]+/, '').trim();
  });

  return questions;
}

function parseAnswer(q) {
  if (!q.rawAnswer) return;
  const raw = q.rawAnswer;

  // Extract the answer content after removing markers
  let ans = raw
    .replace(/^[✔✓√]\s*/, '')
    .replace(/^(答案|Answer)[：:]\s*/i, '')
    .replace(/^[✔✓√]\s*(答案|Answer)[：:]\s*/i, '')
    .trim();

  if (!ans) return;

  if (q.type === 'tf') {
    if (/^(对|是|True|T|正确|√)/i.test(ans)) q.answer = 0;
    else if (/^(错|否|False|F|错误|×)/i.test(ans)) q.answer = 1;
    return;
  }

  if (q.type === 'mc' || q.type === 'ma') {
    // Extract letters like A, B, ABD, etc.
    const letters = ans.match(/[A-D]/gi);
    if (letters) {
      const indices = letters.map(l => l.toUpperCase().charCodeAt(0) - 65);
      if (q.type === 'mc') {
        q.answer = indices[0]; // Single index for MC
      } else {
        q.answer = indices; // Array of indices for MA
      }
    }
    return;
  }

  // For fill-in, store as string
  q.answer = ans;
}

function finalizeType(q) {
  // TF with no explicit options → add default
  if (q.type === 'tf' && q.options.length === 0) {
    q.options = [{ label: 'A', text: 'True' }, { label: 'B', text: 'False' }];
  }
  // No options + fill type → ok, leave empty
  if (q.options.length === 0 && q.type === 'fill') return;
  // Has options but no type yet → guess
  if (!q.type && q.options.length > 0) {
    q.type = q.options.length <= 2 ? 'tf' : 'mc';
  }
  if (!q.type) q.type = 'fill';
  // Normalize options: ensure they're objects with label/text
  q.options = q.options.map(o => typeof o === 'string' ? { label: '', text: o } : o);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function clone(obj) { return JSON.parse(JSON.stringify(obj)); }

  roundQuestions: [],

const WRONG_KEY = 'quiz_tool_wrong';

function getWrongQuestions() {
  try { return JSON.parse(localStorage.getItem(WRONG_KEY)) || []; } catch(e) { return []; }
}

function saveWrongQuestions(qs) {
  localStorage.setItem(WRONG_KEY, JSON.stringify(qs));
}

function addWrongFromRound() {
  let wrong = getWrongQuestions();
  state.history.forEach(h => {
    if (!h.correct) {
      const q = state.roundQuestions[h.index];
      if (q && !wrong.some(w => w.text === q.text)) {
        wrong.push(clone(q));
      }
    }
  });
  saveWrongQuestions(wrong);
  updateWrongBtn();
}

function removeWrongFromBank(text) {
  let wrong = getWrongQuestions();
  wrong = wrong.filter(w => w.text !== text);
  saveWrongQuestions(wrong);
  updateWrongBtn();
}

function updateWrongBtn() {
  const btn = document.getElementById('wrongBtn');
  const count = getWrongQuestions().length;
  if (count > 0) {
    btn.style.display = 'inline-block';
    document.getElementById('wrongCount').textContent = `(${count})`;

    btn.style.display = 'none';

}

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

// Click to upload
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  if (e.target.files.length > 0) handleFile(e.target.files[0]);
});

// Drag and drop
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
});

async function handleFile(file) {
  if (!file.name.endsWith('.docx')) {
    showError('请上传 .docx 格式的 Word 文档');
    return;
  }

  // Show loading
  document.getElementById('uploadScreen').style.display = 'none';
  document.getElementById('loadingArea').style.display = 'block';
  document.getElementById('errorArea').style.display = 'none';

  try {
    const arrayBuffer = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer });
    const rawText = result.value;

    if (!rawText.trim()) {
      showError('未能从文档中提取到文本内容，请检查文档是否为空。');
      return;
    }

    // Parse questions
    const questions = parseQuestions(rawText);

    if (questions.length === 0) {
      showError('未能从文档中识别出题目。请检查文档格式是否符合要求（见页面下方的格式说明）。');
      return;
    }

    // Validate
    let validCount = 0;
    questions.forEach(q => {
      if (q.type === 'tf' || q.type === 'mc' || q.type === 'ma') {
        if (q.answer !== null && q.answer !== undefined) validCount++;
      } else if (q.type === 'fill') {
        if (q.answer) validCount++;
      }
    });

    state.allQuestions = questions;
    state.fileName = file.name;

    // Show preview
    showPreview(questions, rawText, validCount);

  } catch (err) {
    showError('解析文档时出错：' + err.message);
  }
}

// ===================================================================
// PREVIEW
// ===================================================================

function showPreview(questions, rawText, validCount) {
  document.getElementById('loadingArea').style.display = 'none';
  document.getElementById('previewArea').style.display = 'block';

  const total = questions.length;
  const tfCount = questions.filter(q => q.type === 'tf').length;
  const mcCount = questions.filter(q => q.type === 'mc').length;
  const maCount = questions.filter(q => q.type === 'ma').length;
  const fillCount = questions.filter(q => q.type === 'fill').length;

  const typeLabels = [];
  if (tfCount) typeLabels.push(`判断 ${tfCount}题`);
  if (mcCount) typeLabels.push(`单选 ${mcCount}题`);
  if (maCount) typeLabels.push(`多选 ${maCount}题`);
  if (fillCount) typeLabels.push(`填空 ${fillCount}题`);

  // Quiz/section breakdown
  const quizMap = {};
  questions.forEach(q => {
    const key = q.quiz || '未分类';
    if (!quizMap[key]) quizMap[key] = 0;
    quizMap[key]++;
  });
  const quizLabels = Object.entries(quizMap).map(([name, count]) => `${name} ${count}题`);

  document.getElementById('previewSummary').innerHTML =
    `共识别 <strong>${total}</strong> 道题（${typeLabels.join('，')}）` +
    (quizLabels.length > 1 ? `<br><span style="font-size:.8rem;color:#6b7280;">${quizLabels.join(' · ')}</span>` : '') +
    (validCount < total ? ` · <span style="color:#f59e0b;">${total - validCount} 道题未识别到答案</span>` : '');

  // List parsed questions
  const list = document.getElementById('parsedList');
  list.innerHTML = questions.map((q, i) => {
    const typeName = { tf:'判断', mc:'单选', ma:'多选', fill:'填空' }[q.type] || q.type;
    const typeClass = { tf:'badge-tf', mc:'badge-mc', ma:'badge-ma', fill:'badge-fill' }[q.type] || 'badge-tf';
    const hasAns = q.answer !== null && q.answer !== undefined;
    const firstLine = q.text.split('\n')[0].substring(0, 50);
    return `<div class="parsed-item">
      <span class="num">${i+1}.</span>
      <span class="type-badge ${typeClass}">${typeName}</span>
      <span class="preview">${firstLine}${firstLine.length >= 50 ? '...' : ''}</span>
      <span style="margin-left:auto;font-size:.7rem;color:${hasAns ? '#22c55e' : '#f59e0b'}">${hasAns ? '✔' : '⚠️'}</span>
    </div>`;
  }).join('');
}

// ===================================================================
// QUIZ ENGINE
// ===================================================================

function startQuiz() {
  document.getElementById('previewArea').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  document.getElementById('fileName').textContent = '' + state.fileName;

  populateFilters();
  startNewRound();
}

function getFilteredQuestions() {
  // Apply quiz filter
  const quizVal = document.getElementById('quizFilter').value;
  let pool = state.allQuestions;
  if (quizVal !== 'all') {
    pool = pool.filter(q => q.quiz === quizVal);
  }

  // Apply type filters
  const checkedTypes = [];
  document.querySelectorAll('#typeFilters .type-filter-label').forEach(label => {
    if (label.querySelector('input').checked) {
      checkedTypes.push(label.dataset.type);
    }
  });
  if (checkedTypes.length > 0 && checkedTypes.length < 4) {
    pool = pool.filter(q => checkedTypes.includes(q.type));
  }

  return pool;
}

function populateFilters() {
  // Quiz dropdown
  const quizSet = new Set();
  state.allQuestions.forEach(q => {
    if (q.quiz) quizSet.add(q.quiz);
  });
  const select = document.getElementById('quizFilter');
  select.innerHTML = '<option value="all">全部单元</option>';
  [...quizSet].sort().forEach(q => {
    const opt = document.createElement('option');
    opt.value = q;
    opt.textContent = q;
    select.appendChild(opt);
  });

  // Type filter click toggles
  document.querySelectorAll('#typeFilters .type-filter-label').forEach(label => {
    label.onclick = function() {
      const cb = this.querySelector('input');
      cb.checked = !cb.checked;
      this.style.opacity = cb.checked ? '1' : '.4';
    };
  });
}

function applyFilters() {
  if (state.history.length > 0) {
    if (!confirm('切换筛选条件将重新开始，确定吗？')) return;
  }
  startNewRound();
}

function startWrongQuiz() {
  const wrong = getWrongQuestions();
  if (wrong.length === 0) {
    alert('错题本还是空的！做完题答错的会自动收录。');
    return;
  }

  state.allQuestions = wrong;
  state.fileName = '📕 错题本';
  state.wrongMode = true;

  document.getElementById('uploadScreen').style.display = 'none';
  document.getElementById('previewArea').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  document.getElementById('fileName').textContent = '📕 错题本 — 答对后自动移除';
  document.getElementById('quizFilter').innerHTML = '<option value="all">全部</option>';
  document.querySelectorAll('#typeFilters .type-filter-label').forEach(l => {
    l.querySelector('input').checked = true;
    l.style.opacity = '1';
  });

  startNewRound();
}

function startNewRound() {
  cleanupKeyboard();
  const pool = getFilteredQuestions();
  if (pool.length === 0) {
    document.getElementById('quizArea').innerHTML =
      '<div class="question-card" style="text-align:center;padding:40px;color:#6b7280;">没有符合条件的题目。<br>请调整筛选条件后点击「筛选」按钮。</div>';
    return;
  }
  const questions = clone(pool);
  shuffle(questions);

  // Shuffle options within each question
  questions.forEach(q => {
    if (q.type !== 'tf' && q.options.length > 0) {
      const optIndices = q.options.map((_, i) => i);
      shuffle(optIndices);
      const newOpts = optIndices.map(i => q.options[i]);
      if (q.type === 'mc' && typeof q.answer === 'number') {
        q.answer = optIndices.indexOf(q.answer);
      } else if (q.type === 'ma' && Array.isArray(q.answer)) {
        q.answer = q.answer.map(a => optIndices.indexOf(a));
      }
      q.options = newOpts;
    }
  });

  state.roundQuestions = questions;
  state.currentIndex = 0;
  state.answered = false;
  state.correctCount = 0;
  state.wrongCount = 0;
  state.history = [];
  state.startTime = Date.now();

  renderQuestion();
  updateStats();
}

function shuffleAndRestart() {
  if (state.history.length > 0) {
    if (!confirm('当前进度将丢失，确定重新开始吗？')) return;
  }
  startNewRound();
}

function cleanupKeyboard() {
  const area = document.getElementById('quizArea');
  if (area._cleanup) area._cleanup();
}

function renderQuestion() {
  const area = document.getElementById('quizArea');
  if (area._cleanup) area._cleanup();

  if (state.currentIndex >= state.roundQuestions.length) {
    renderSummary();
    return;
  }

  const q = state.roundQuestions[state.currentIndex];
  const idx = state.currentIndex;
  const total = state.roundQuestions.length;

  const typeLabels = { tf:'判断题', mc:'单选题', ma:'多选题', fill:'填空题' };
  const badgeClass = { tf:'badge-tf', mc:'badge-mc', ma:'badge-ma', fill:'badge-fill' };

  const mainText = q.text;
  const altText = q.altText || '';

  let html = `<div class="question-card">
    <div class="q-number">第 ${idx+1} 题 / 共 ${total} 题</div>
    <span class="q-badge ${badgeClass[q.type]}">${typeLabels[q.type] || q.type}</span>
    <div class="q-text">${mainText}${altText ? `<span class="en">${altText}</span>` : ''}</div>`;

  if (q.type === 'fill') {
    html += `<input type="text" class="fill-input" id="fillInput" placeholder="输入答案..." autocomplete="off">`;
  } else {
    html += `<div class="options">`;
    q.options.forEach((opt, oi) => {
      const letter = String.fromCharCode(65 + oi);
      const inputType = q.type === 'ma' ? 'checkbox' : 'radio';
      html += `<label class="option" data-oi="${oi}">
        <input type="${inputType}" name="q${q.id}" value="${oi}">
        <span class="letter">${letter}.</span>
        <span>${opt.text || opt}</span>
      </label>`;
    });
    html += `</div>`;
  }

  html += `<div class="actions">
    <button class="btn-submit" id="submitBtn" onclick="submitAnswer()">提交</button>
    <button class="btn-next" id="nextBtn" onclick="nextQuestion()" style="${state.answered ? '' : 'display:none'}">${idx+1 >= total ? '查看结果' : '下一题 →'}</button>
    <button class="btn-reset" onclick="resetCurrent()">重置</button>
  </div>
  <div class="feedback" id="feedback"></div>
  </div>`;

  area.innerHTML = html;
  updateProgress();

  // Auto-focus fill input
  if (q.type === 'fill') {
    setTimeout(() => document.getElementById('fillInput')?.focus(), 100);
  }

  // Keyboard shortcuts
  const handler = (e) => {
    if (e.key === 'Enter') {
      if (e.target?.type === 'text') { submitAnswer(); return; }
      if (!state.answered) { e.preventDefault(); submitAnswer(); }
      else { e.preventDefault(); nextQuestion(); }
      return;
    }
    if (e.key === ' ') {
      if (e.target?.type === 'text') return;
      e.preventDefault();
      if (!state.answered) submitAnswer();
      else nextQuestion();
      return;
    }
    // 1-9 number keys for options
    const n = parseInt(e.key);
    if (n >= 1 && n <= 9 && !state.answered) {
      const opts = document.querySelectorAll('.option');
      if (opts[n-1]) {
        const input = opts[n-1].querySelector('input');
        if (input && !input.disabled) {
          if (input.type === 'checkbox') input.checked = !input.checked;
          else input.checked = true;
        }
      }
    }
    // A-J letter keys
    const li = 'abcdefghij'.indexOf(e.key.toLowerCase());
    if (li >= 0 && !state.answered) {
      const opts = document.querySelectorAll('.option');
      if (opts[li]) {
        const input = opts[li].querySelector('input');
        if (input && !input.disabled) {
          if (input.type === 'checkbox') input.checked = !input.checked;
          else input.checked = true;
        }
      }
    }
  };

  document.addEventListener('keydown', handler);
  const cleanup = () => document.removeEventListener('keydown', handler);
  area._cleanup = cleanup;
}

function submitAnswer() {
  if (state.answered) return;
  const q = state.roundQuestions[state.currentIndex];
  if (!q) return;

  let isCorrect = false;
  let feedbackHtml = '';
  let fbClass = '';

  if (q.type === 'fill') {
    const input = document.getElementById('fillInput');
    if (!input || !input.value.trim()) return;
    const ans = input.value.trim().toLowerCase();
    const expected = String(q.answer).toLowerCase().split(';').map(s => s.trim());
    isCorrect = expected.some(e => ans.includes(e)) || expected.includes(ans);
    fbClass = isCorrect ? 'correct-fb' : 'wrong-fb';
    feedbackHtml = isCorrect ? '✔ 正确！' : `✘ 错误。正确答案：${q.answer}`;
    input.classList.add(isCorrect ? 'correct' : 'wrong');
    input.disabled = true;
    state.answered = true;

  } else {
    const options = document.querySelectorAll('.option');
    const selected = [];
    options.forEach((opt, oi) => {
      if (opt.querySelector('input').checked) selected.push(oi);
    });
    if (selected.length === 0) return;

    if (q.type === 'tf' || q.type === 'mc') {
      const chosenIdx = selected[0];
      isCorrect = chosenIdx === q.answer;

      options.forEach((opt, oi) => {
        opt.classList.remove('selected');
        if (oi === q.answer) opt.classList.add('show-correct');
        if (oi === chosenIdx) opt.classList.add(isCorrect ? 'correct' : 'wrong');
        opt.querySelector('input').disabled = true;
      });

      const correctText = q.options[q.answer]?.text || q.options[q.answer] || '';
      feedbackHtml = isCorrect ? '✔ 正确！' : `✘ 错误。正确答案是：${correctText.substring(0, 80)}`;
      state.answered = true;

    } else { // MA
      const correctSet = new Set(Array.isArray(q.answer) ? q.answer : [q.answer]);
      const selectedSet = new Set(selected);
      // Correct if: selected == answer set
      isCorrect = selectedSet.size === correctSet.size && [...selectedSet].every(s => correctSet.has(s));

      const correctLetters = [...correctSet].map(i => String.fromCharCode(65 + i)).join(', ');
      feedbackHtml = isCorrect ? '✔ 全部正确！' : `✘ 错误。正确答案：${correctLetters}`;
      fbClass = isCorrect ? 'correct-fb' : 'wrong-fb';

      options.forEach((opt, oi) => {
        const input = opt.querySelector('input');
        if (input.checked) opt.classList.add('selected');
        if (correctSet.has(oi)) opt.classList.add('show-correct');
        if (input.checked && correctSet.has(oi)) opt.classList.add('correct');
        if (input.checked && !correctSet.has(oi)) opt.classList.add('wrong');
        input.disabled = true;
      });
      state.answered = true;
    }
  }

  // Show feedback
  if (q.type !== 'ma') {
    const fb = document.getElementById('feedback');
    fb.className = `feedback show ${fbClass || (isCorrect ? 'correct-fb' : 'wrong-fb')}`;
    fb.innerHTML = feedbackHtml;
  } else {
    const fb = document.getElementById('feedback');
    fb.className = `feedback show ${fbClass}`;
    fb.innerHTML = feedbackHtml;
  }

  if (isCorrect) state.correctCount++; else state.wrongCount++;
  state.history.push({ index: state.currentIndex, correct: isCorrect });

  // 错题本模式：答对就移除
  if (state.wrongMode && isCorrect) {
    removeWrongFromBank(q.text);
  }

  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = '';
  updateStats();
}

function nextQuestion() {
  state.answered = false;
  state.currentIndex++;
  renderQuestion();
}

function resetCurrent() {
  state.answered = false;
  renderQuestion();
}

// ===================================================================
// SUMMARY
// ===================================================================

function renderSummary() {
  cleanupKeyboard();
  const total = state.history.length;
  const correct = state.correctCount;
  const wrong = state.wrongCount;
  const pct = total > 0 ? Math.round(correct / total * 100) : 0;
  const elapsed = Math.round((Date.now() - state.startTime) / 60000);
  const minLabel = elapsed > 0 ? `${elapsed} 分钟` : '<1 分钟';

  let breakdown = '';
  state.history.forEach((h, i) => {
    const q = state.roundQuestions[h.index];
    if (!q) return;
    const icon = h.correct ? '✔' : '✘';
    const firstLine = (q.text || '').split('\n')[0].substring(0, 60);
    breakdown += `<div class="breakdown-item ${h.correct ? '' : 'wrong-item'}">
      <span style="font-weight:600;${h.correct ? 'color:#22c55e' : 'color:#ef4444'}">${icon}</span>
      <span class="q-preview">${firstLine}${firstLine.length >= 60 ? '...' : ''}</span>
    </div>`;
  });

  const area = document.getElementById('quizArea');

  // 自动存错题到错题本（非错题本模式）
  if (!state.wrongMode && wrong > 0) addWrongFromRound();

  // 错题本模式：看看还剩多少
  const remainingWrong = state.wrongMode ? getWrongQuestions().length : 0;

  area.innerHTML = `<div class="summary-wrap question-card">
    <h2>${state.wrongMode ? '📕 错题本' : '答题完成！'}</h2>
    <div class="score">${pct}%</div>
    <div class="sub">${correct} / ${total} 正确</div>
    <div class="detail">${state.wrongMode ? `已清除 ${correct} 道错题` : `${wrong} 道错误`} · 用时 ${minLabel}</div>
    ${state.wrongMode && remainingWrong > 0 ? `<div style="margin-top:4px;color:#ef4444;font-size:.9rem;">还有 ${remainingWrong} 道错题未清除</div>` : ''}
    ${state.wrongMode && remainingWrong === 0 ? `<div style="margin-top:4px;color:#22c55e;font-size:.9rem;font-weight:600;">🗑️ 错题本已清空！</div>` : ''}
    <div class="breakdown">${breakdown}</div>
    <div class="actions" style="justify-content:center;margin-top:20px;flex-wrap:wrap;">
      ${!state.wrongMode && wrong > 0 ? `<button onclick="reviewWrong()" style="padding:12px 24px;background:#ef4444;color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;"> 复习 ${wrong} 道错题</button>` : ''}
      ${state.wrongMode && remainingWrong > 0 ? `<button onclick="shuffleAndRestart()" style="padding:12px 24px;background:#ef4444;color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;">🔄 继续刷错题</button>` : ''}
      <button onclick="shuffleAndRestart()" style="padding:12px 32px;background:#1a1a2e;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;"> 再来一轮</button>
      <button onclick="showUpload()" style="padding:12px 32px;background:#6b7280;color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;"> 换文档</button>
    </div>
  </div>`;
  updateProgress();
}

function reviewWrong() {
  cleanupKeyboard();
  const wrongItems = [];
  state.history.forEach(h => {
    if (!h.correct) wrongItems.push(state.roundQuestions[h.index]);
  });
  if (wrongItems.length === 0) return;

  const area = document.getElementById('quizArea');
  const typeLabels = { tf:'判断题', mc:'单选题', ma:'多选题', fill:'填空题' };
  const badgeClass = { tf:'badge-tf', mc:'badge-mc', ma:'badge-ma', fill:'badge-fill' };

  let html = `<div class="question-card" style="text-align:center;margin-bottom:20px;">
    <h2> 错题复习</h2>
    <p style="color:#6b7280;margin-top:4px;">共 ${wrongItems.length} 道错题</p>
    <button onclick="renderSummary()" style="margin-top:12px;padding:10px 24px;background:#6b7280;color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;">← 返回结果</button>
  </div>`;

  wrongItems.forEach((q, i) => {
    const mainText = q.text;
    const altText = q.altText || '';

    html += `<div class="question-card">
      <div class="q-number">错题 ${i+1}</div>
      <span class="q-badge ${badgeClass[q.type] || 'badge-tf'}">${typeLabels[q.type] || q.type}</span>
      <div class="q-text">${mainText}${altText ? `<span class="en">${altText}</span>` : ''}</div>`;

    if (q.type === 'fill') {
      html += `<div style="padding:12px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;">
        <strong>正确答案：</strong>${q.answer}</div>`;
    } else {
      html += `<div class="options">`;
      q.options.forEach((opt, oi) => {
        const isCorrect = q.type === 'ma'
          ? (Array.isArray(q.answer) && q.answer.includes(oi))
          : q.answer === oi;
        const letter = String.fromCharCode(65 + oi);
        html += `<div class="option ${isCorrect ? 'show-correct' : ''}" style="${isCorrect ? '' : 'opacity:.6;'}">
          <span class="letter">${letter}.</span>
          <span>${opt.text || opt}</span>
          ${isCorrect ? '<span style="margin-left:auto;color:#22c55e;font-weight:600;">✔</span>' : ''}
        </div>`;
      });
      html += `</div>`;
    }

    html += `</div>`;
  });

  area.innerHTML = html;
}

// ===================================================================
// DEBUG
// ===================================================================

let debugShown = false;

function showDebug() {
  if (!debugShown) {
    const area = document.getElementById('quizArea');
    const qs = state.roundQuestions;
    let html = `<div class="question-card">
      <h3 style="margin-bottom:8px;">🔍 Debug 信息</h3>
      <p style="font-size:.8rem;color:#6b7280;margin-bottom:12px;">
        共 ${qs.length} 题，已回答 ${state.history.length} 题</p>
      <button onclick="renderSummary()" style="padding:8px 20px;background:#6b7280;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-bottom:16px;">← 返回</button>`;

    qs.forEach((q, i) => {
      const ansStr = q.type === 'ma'
        ? (Array.isArray(q.answer) ? q.answer.join(',') : q.answer)
        : q.answer;
      const historyEntry = state.history.find(h => h.index === i);
      const status = historyEntry ? (historyEntry.correct ? '✔' : '✘') : '—';
      const textPreview = (q.text || '').split('\n')[0].substring(0, 40);
      html += `<div style="padding:4px 0;font-size:.75rem;border-bottom:1px solid #374151;">
        <span style="color:#4f46e5">#${i+1}</span>
        <span style="color:#9ca3af">[${q.type}]</span>
        <span>${textPreview}</span>
        <span style="float:right">答:${ansStr} ${status}</span>
      </div>`;
    });

    html += `</div>`;
    area.innerHTML = html;
    debugShown = true;
  } else {
    renderSummary();
    debugShown = false;
  }
}

// ===================================================================
// PROGRESS & STATS
// ===================================================================

function updateProgress() {
  const total = state.roundQuestions.length;
  const done = state.history.length;
  const pct = total > 0 ? (done / total * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
}

function updateStats() {
  const total = state.roundQuestions.length;
  const done = state.history.length;
  const correct = state.correctCount;
  document.getElementById('statsDisplay').textContent =
    total > 0 ? `✔ ${correct}/${done} · ${done}/${total}` : '0 / 0';
}

// ===================================================================
// INIT
// ===================================================================

showUpload();
</script>
</body>
</html>

.demo-section { text-align: center; margin-top: 20px; }

.toolbar {

.progress-wrap { background: #e5e7eb; border-radius: 99px; height: 6px; margin-bottom: 20px; overflow: hidden; }
.progress-bar { height: 100%; background: linear-gradient(90deg, #4f46e5, #6366f1); border-radius: 99px; transition: width .3s ease; width: 0%; }

.question-card {

.badge-tf { background: #dbeafe; color: #1e40af; }

}

.option.wrong { border-color: #ef4444; background: #fef2f2; }

.option .letter { font-weight: 600; color: #4f46e5; flex-shrink: 0; min-width: 20px; }

.fill-input {

.fill-input.correct { border-color: #22c55e; background: #f0fdf4; }
.fill-input.wrong { border-color: #ef4444; background: #fef2f2; }

.actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }

.feedback {

.feedback.show { display: block; }

@keyframes shake {

    <div class="parsed-list" id="parsedList"></div>
    <div class="actions" style="margin-top:16px;">
      <button class="btn-start" onclick="startQuiz()">т╝ђтДІтѕижбў</button>
      <button class="btn-reupload" onclick="showUpload()">жЄЇТќ░СИіС╝а</button>
    </div>
  </div>

  <!-- ============ QUIZ SCREEN ============ -->
  <div id="quizScreen" style="display:none">
    <div class="toolbar">
      <span class="file-name" id="fileName"></span>
      <div class="filters" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
        <select id="quizFilter" style="padding:5px 8px;border-radius:6px;border:1px solid #d1d5db;font-size:.78rem;background:#fff;"></select>
        <span style="display:flex;gap:4px;flex-wrap:wrap;" id="typeFilters">
          <label class="type-filter-label" data-type="tf" style="font-size:.75rem;cursor:pointer;padding:4px 10px;border-radius:6px;background:#dbeafe;color:#1e40af;font-weight:600;user-select:none;display:flex;align-items:center;gap:4px;"><input type="checkbox" checked style="margin:0;width:13px;height:13px;accent-color:#4f46e5;"> тѕцТќГ</label>
          <label class="type-filter-label" data-type="mc" style="font-size:.75rem;cursor:pointer;padding:4px 10px;border-radius:6px;background:#d1fae5;color:#065f46;font-weight:600;user-select:none;display:flex;align-items:center;gap:4px;"><input type="checkbox" checked style="margin:0;width:13px;height:13px;accent-color:#4f46e5;"> тЇЋжђЅ</label>
          <label class="type-filter-label" data-type="ma" style="font-size:.75rem;cursor:pointer;padding:4px 10px;border-radius:6px;background:#fef3c7;color:#92400e;font-weight:600;user-select:none;display:flex;align-items:center;gap:4px;"><input type="checkbox" checked style="margin:0;width:13px;height:13px;accent-color:#4f46e5;"> тцџжђЅ</label>
          <label class="type-filter-label" data-type="fill" style="font-size:.75rem;cursor:pointer;padding:4px 10px;border-radius:6px;background:#f3e8ff;color:#6b21a8;font-weight:600;user-select:none;display:flex;align-items:center;gap:4px;"><input type="checkbox" checked style="margin:0;width:13px;height:13px;accent-color:#4f46e5;"> тАФуЕ║</label>
        </span>
      </div>
      <span class="stats" id="statsDisplay">0 / 0</span>
      <button id="wrongBtn2" onclick="startWrongQuiz()" style="display:none;padding:6px 14px;border-radius:8px;border:1px solid #ef4444;font-size:.8rem;cursor:pointer;background:#fff;color:#ef4444;font-weight:600;">­ЪЊЋ жћЎжбў</button>
      <button onclick="shuffleAndRestart()" class="primary" id="btnShuffle">ТЅЊС╣▒</button>
      <button onclick="showUpload()" class="danger">жђђтЄ║</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>

    <!-- Summary will be rendered here when done -->

</div>

<script>
// ===================================================================
// PARSER Рђћ С╗ј Word ТќЄТАБТќЄТюгСИГТЈљтЈќжбўуЏ«
// ===================================================================

function splitInlineOptions(line) {
  // Handle "A. xxx  B. xxx  C. xxx" on one line
  const parts = line.split(/\s{2,}(?=[A-Da-d][.сђЂ№╝ј\)])/);
  if (parts.length > 1) {
    return parts.map(p => {
      const m = p.match(/^([A-Da-d])[.сђЂ№╝ј\)]\s*(.*)/);
      return m ? { label: m[1].toUpperCase(), text: m[2].trim() } : null;
    }).filter(Boolean);
  }
  const parts2 = line.split(/\s{2,}(?=[A-Da-d]\s{2,})/);
  if (parts2.length > 1 && parts2[0].length < 10) {
    return parts2.map(p => {
      const m = p.match(/^([A-Da-d])\s{2,}(.*)/);
      return m ? { label: m[1].toUpperCase(), text: m[2].trim() } : null;
    }).filter(Boolean);
  }
  return null;
}

function parseQuestions(rawText) {
  const lines = rawText.split('\n');
  const questions = [];
  let current = null;
  let currentType = null;
  let qnum = 0;
  let inAlt = false;
  let pendingAnswer = null; // accumulate multi-line answers

  const clean = s => s.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F-\x9F]/g, '').trim();

  function flushPendingAnswer() {
    if (pendingAnswer && current) {
      current.rawAnswer = pendingAnswer;
      inAlt = false;
    }
    pendingAnswer = null;
  }

  function newQuestion(num, text) {
    inAlt = false;
    pendingAnswer = null;
    return { number: num, text: text, options: [], answer: null, type: currentType, rawAnswer: null, altText: '' };
  }

  function saveCurrent() {
    flushPendingAnswer();
    if (!current || !current.text.trim()) return;
    if (!current.type) {
      if (current.options.length === 2 && current.options.some(o =>
        /^(True|False|т»╣|жћЎ|T|F|Тў»|тљд|ТГБуА«|жћЎУ»»|Рѕџ|├Ќ)$/i.test(o.text.trim())
      )) {
        current.type = 'tf';
      } else if (current.options.length > 0) {
        current.type = 'mc';
      } else {
        current.type = 'fill';
      }
    }
    questions.push({
      id: questions.length + 1,
      number: current.number,
      type: current.type,
      text: current.text.trim(),
      altText: current.altText.trim(),
      options: current.options,
      answer: current.answer,
      rawAnswer: current.rawAnswer
    });
  }

  for (let i = 0; i < lines.length; i++) {
    let line = clean(lines[i]);
    if (!line) { flushPendingAnswer(); continue; }

    // Separator lines
    if (/^[РћђРћЂРЋљРќгРќѕ\-*=РђбРЌІРЌЈРЮц№ИЈРќХРЌєРЌЄ]{3,}$/.test(line)) { continue; }

    // Section headers Рђћ detect type
    const zhSec = line.match(/[СИђС║їСИЅтЏЏС║ћтЁГСИЃтЁФС╣ЮтЇЂуЎЙ]+[сђЂ№╝ј.\s]\s*(тѕцТќГ|тЇЋжђЅ|тцџжђЅ|тАФуЕ║|у«ђуГћ|тљЇУ»ЇУДБжЄі)/);
    if (zhSec) {
      const t = zhSec[1];
      if (t.includes('тѕцТќГ')) currentType = 'tf';
      else if (t.includes('тЇЋжђЅ')) currentType = 'mc';
      else if (t.includes('тцџжђЅ')) currentType = 'ma';
      else if (t.includes('тАФуЕ║')) currentType = 'fill';
      continue;
    }
    if (/True or False/i.test(line)) { currentType = 'tf'; continue; }
    if (/Multiple[-\s]Answer|тцџжђЅжбў/i.test(line)) { currentType = 'ma'; continue; }
    if (/Multiple Choice|Single Choice|тЇЋжђЅжбў/i.test(line)) { currentType = 'mc'; continue; }
    if (/Fill[\s-]in[\s-]the[\s-]Blank|тАФуЕ║жбў/i.test(line)) { currentType = 'fill'; continue; }
    if (/[РќѕРќг]/.test(line) && line.length > 8) continue;

    // --- Number detection ---
    const numMatch = line.match(/^(\d+)[сђЂ.№╝ј\)\s]?\s*/);
    if (numMatch) {
      flushPendingAnswer();
      const num = parseInt(numMatch[1]);
      const textAfter = line.slice(numMatch[0].length).trim();
      if (num !== qnum || !current) {
        saveCurrent();
        current = newQuestion(num, textAfter);
        qnum = num;
        inAlt = false;
      } else {
        // Same # Рђћ bilingual alt section starts
        inAlt = true;
        current.altText += (current.altText ? '\n' : '') + textAfter;
      }
      continue;
    }

    // --- Answer markers (check before inAlt and normal flow) ---
    if (/[РюћРюЊРѕџ]/.test(line) || /^уГћТАѕ[№╝џ:]\s*/.test(line) || /^Answer[№╝џ:]\s*/i.test(line)) {
      if (current) {
        const afterCheck = line.replace(/[РюћРюЊРѕџ]/g, '').replace(/^(уГћТАѕ|Answer)[№╝џ:]\s*/i, '').trim();
        if (afterCheck.length >= 1) {
          // Complete answer on one line
          current.rawAnswer = line;
          inAlt = false;
          pendingAnswer = null;
          continue;
        }
        // Bare Рюћ Рђћ start pending answer accumulation
        pendingAnswer = line;
        continue;
      }
    }

    // --- Pending answer accumulation (multi-line answers like Рюћ\nFalse\n/\nжћЎ) ---
    if (pendingAnswer) {
      const isMore = line.length < 30 && !/^[A-E]/.test(line);
      if (isMore) {
        pendingAnswer += ' ' + line;
        continue;
      } else {
        flushPendingAnswer();
        // fall through
      }
    }

    // --- In alt section: just accumulate text ---
    if (inAlt && current) {
      current.altText += ' ' + line;
      continue;
    }

    // --- Options ---
    // First try: inline options on one line
    const inlineOpts = current ? splitInlineOptions(line) : null;
    if (inlineOpts && inlineOpts.length >= 2) {
      inlineOpts.forEach(o => current.options.push(o));
      continue;
    }
    const optMatch = line.match(/^([A-Ea-e])[сђЂ.№╝ј\)\s]\s*(.+)/);
    if (optMatch && current && !line.match(/^[A-Ea-e]\)\s*$/)) {
      current.options.push({ label: optMatch[1].toUpperCase(), text: optMatch[2].trim() });
      continue;
    }

    // --- Fallback: append to question text ---
    if (current && line.length > 1) {
      current.text += ' ' + line;
    }
  }

  saveCurrent();

  // Post-process
  questions.forEach(q => {
    parseAnswer(q);
    finalizeType(q);
    q.text = q.text.replace(/^[РќфРќИРъб\s]+/, '').trim();
  });

  return questions;
}

function parseAnswer(q) {
  if (!q.rawAnswer) return;
  const raw = q.rawAnswer;

  // Extract the answer content after removing markers
  let ans = raw
    .replace(/^[РюћРюЊРѕџ]\s*/, '')
    .replace(/^(уГћТАѕ|Answer)[№╝џ:]\s*/i, '')
    .replace(/^[РюћРюЊРѕџ]\s*(уГћТАѕ|Answer)[№╝џ:]\s*/i, '')
    .trim();

  if (!ans) return;

  if (q.type === 'tf') {
    if (/^(т»╣|Тў»|True|T|ТГБуА«|Рѕџ)/i.test(ans)) q.answer = 0;
    else if (/^(жћЎ|тљд|False|F|жћЎУ»»|├Ќ)/i.test(ans)) q.answer = 1;
    return;
  }

  if (q.type === 'mc' || q.type === 'ma') {
    // Extract letters like A, B, ABD, etc.
    const letters = ans.match(/[A-D]/gi);
    if (letters) {
      const indices = letters.map(l => l.toUpperCase().charCodeAt(0) - 65);
      if (q.type === 'mc') {
        q.answer = indices[0]; // Single index for MC
      } else {
        q.answer = indices; // Array of indices for MA
      }
    }
    return;
  }

  // For fill-in, store as string
  q.answer = ans;
}

function finalizeType(q) {
  // TF with no explicit options Рєњ add default
  if (q.type === 'tf' && q.options.length === 0) {
    q.options = [{ label: 'A', text: 'True' }, { label: 'B', text: 'False' }];
  }
  // No options + fill type Рєњ ok, leave empty
  if (q.options.length === 0 && q.type === 'fill') return;
  // Has options but no type yet Рєњ guess
  if (!q.type && q.options.length > 0) {
    q.type = q.options.length <= 2 ? 'tf' : 'mc';
  }
  if (!q.type) q.type = 'fill';
  // Normalize options: ensure they're objects with label/text
  q.options = q.options.map(o => typeof o === 'string' ? { label: '', text: o } : o);
}

// ===================================================================
// UTILITY
// ===================================================================

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function clone(obj) { return JSON.parse(JSON.stringify(obj)); }

// ===================================================================
// STATE
// ===================================================================

const state = {
  allQuestions: [],
  roundQuestions: [],
  currentIndex: 0,
  answered: false,
  correctCount: 0,
  wrongCount: 0,
  history: [],
  fileName: '',
  startTime: null,
  wrongMode: false  // жћЎжбўТюгТеАт╝Ј
};

// ===================================================================
// У»ЙуеІу│╗у╗Ъ + жћЎжбўТюг Рђћ localStorage ТїЂС╣Ётїќ
// ===================================================================

const COURSES_KEY = 'quiz_tool_courses';
let currentCourseId = null;

function getCourses() {
  try { return JSON.parse(localStorage.getItem(COURSES_KEY)) || []; } catch(e) { return []; }
}

function saveCourses(courses) {
  localStorage.setItem(COURSES_KEY, JSON.stringify(courses));
}

function addCourse(name, fileName, questions) {
  const courses = getCourses();
  // тљїтљЇУдєуЏќ
  const existing = courses.findIndex(c => c.name === name);
  const course = { id: Date.now().toString(), name, fileName, questions: clone(questions), wrongQuestions: [], date: Date.now() };
  if (existing >= 0) courses[existing] = course;
  else courses.push(course);
  saveCourses(courses);
  return course;
}

function deleteCourse(id) {
  if (!confirm('уА«т«џтѕажЎцУ»ЦУ»ЙуеІтЈітЁХжћЎжбўтљЌ№╝Ъ')) return;
  let courses = getCourses();
  courses = courses.filter(c => c.id !== id);
  saveCourses(courses);
  if (currentCourseId === id) currentCourseId = null;
  renderCourseList();
}

function setCurrentCourse(id) {
  const courses = getCourses();
  const course = courses.find(c => c.id === id);
  if (!course) return;
  currentCourseId = course.id;
  state.allQuestions = clone(course.questions);
  state.fileName = course.name;
  state.wrongMode = false;
}

// жћЎжбўТюг№╝ѕТїЅУ»ЙуеІ№╝Ѕ
function getCourseWrong(courseId) {
  const courses = getCourses();
  const course = courses.find(c => c.id === courseId);
  return course ? course.wrongQuestions : [];
}

function saveCourseWrong(courseId, wrong) {
  const courses = getCourses();
  const course = courses.find(c => c.id === courseId);
  if (course) { course.wrongQuestions = wrong; saveCourses(courses); }
}

function addWrongFromRound() {
  if (!currentCourseId) return;
  let wrong = getCourseWrong(currentCourseId);
  state.history.forEach(h => {
    if (!h.correct) {
      const q = state.roundQuestions[h.index];
      if (q && !wrong.some(w => w.text === q.text)) wrong.push(clone(q));
    }
  });
  saveCourseWrong(currentCourseId, wrong);
}

function removeWrongFromBank(text) {
  if (!currentCourseId) return;
  let wrong = getCourseWrong(currentCourseId);
  wrong = wrong.filter(w => w.text !== text);
  saveCourseWrong(currentCourseId, wrong);
}

function clearWrongBank() {
  if (!currentCourseId) { alert('У»итЁѕжђЅТІЕУ»ЙуеІ'); return; }
  if (!confirm('уА«т«џТИЁуЕ║У»ЦУ»ЙуеІуџёжћЎжбўТюгтљЌ№╝Ъ')) return;
  saveCourseWrong(currentCourseId, []);
  if (state.wrongMode) showUpload();
  else renderCourseList();
}

function renderCourseList() {
  const container = document.getElementById('courseList');
  const courses = getCourses();
  if (courses.length === 0) { container.innerHTML = ''; return; }

  container.innerHTML = '<h3 style="font-size:.95rem;color:#374151;margin-bottom:12px;">ТѕЉуџёУ»ЙуеІ</h3>' +
    courses.map(c => {
      const wrongCount = c.wrongQuestions.length;
      return `<div class="course-card" onclick="enterCourse('${c.id}')">
        <div class="icon">­ЪЊџ</div>
        <div class="info">
          <div class="name">${c.name}</div>
          <div class="meta">${c.questions.length} жЂЊжбў${wrongCount > 0 ? ` ┬и жћЎжбў ${wrongCount} жЂЊ` : ''}</div>
        </div>
        <button class="del-btn" onclick="event.stopPropagation();deleteCourse('${c.id}')">тѕажЎц</button>
      </div>`;
    }).join('');
}

function enterCourse(id) {
  setCurrentCourse(id);
  document.getElementById('uploadScreen').style.display = 'none';
  document.getElementById('previewArea').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  document.getElementById('fileName').textContent = state.fileName;

  // ТюЅжћЎжбўТЌХТўЙуц║жћЎжбўТїЅжњ«
  const wrong = getCourseWrong(id);
  const wrongBtn2 = document.getElementById('wrongBtn2');
  if (wrong.length > 0) {
    wrongBtn2.style.display = 'inline-block';
    wrongBtn2.innerHTML = `­ЪЊЋ жћЎжбў (${wrong.length})`;
  } else {
    wrongBtn2.style.display = 'none';
  }

  populateFilters();
  startNewRound();
}

// ТЏ┤Тќ░ showUpload№╝џТўЙуц║жћЎжбўТїЅжњ«
function showUpload() {
  document.getElementById('uploadScreen').style.display = 'block';
  document.getElementById('loadingArea').style.display = 'none';
  document.getElementById('errorArea').style.display = 'none';
  document.getElementById('previewArea').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('quizArea').innerHTML = '';
  cleanupKeyboard();
  state.wrongMode = false;
  renderCourseList();
}


function showError(msg) {
  document.getElementById('uploadScreen').style.display = 'none';
  document.getElementById('loadingArea').style.display = 'none';
  document.getElementById('errorArea').style.display = 'block';
  document.getElementById('errorMsg').textContent = msg;
}

// ===================================================================
// FILE UPLOAD HANDLING
// ===================================================================

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

// Click to upload
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  if (e.target.files.length > 0) handleFile(e.target.files[0]);
});

// Drag and drop
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
});

async function handleFile(file) {
  if (!file.name.endsWith('.docx')) {
    showError('У»иСИіС╝а .docx Та╝т╝Јуџё Word ТќЄТАБ');
    return;
  }

  // Show loading
  document.getElementById('uploadScreen').style.display = 'none';
  document.getElementById('loadingArea').style.display = 'block';
  document.getElementById('errorArea').style.display = 'none';

  try {
    const arrayBuffer = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer });
    const rawText = result.value;

    if (!rawText.trim()) {
      showError('ТюфУЃйС╗јТќЄТАБСИГТЈљтЈќтѕ░ТќЄТюгтєЁт«╣№╝їУ»иТБђТЪЦТќЄТАБТў»тљдСИ║уЕ║сђѓ');
      return;
    }

    // Parse questions
    const questions = parseQuestions(rawText);

    if (questions.length === 0) {
      showError('ТюфУЃйС╗јТќЄТАБСИГУ»єтѕФтЄ║жбўуЏ«сђѓУ»иТБђТЪЦТќЄТАБТа╝т╝ЈТў»тљдугдтљѕУдЂТ▒ѓ№╝ѕУДЂжАхжЮбСИІТќ╣уџёТа╝т╝ЈУ»┤Тўј№╝Ѕсђѓ');
      return;
    }

    // Validate
    let validCount = 0;
    questions.forEach(q => {
      if (q.type === 'tf' || q.type === 'mc' || q.type === 'ma') {
        if (q.answer !== null && q.answer !== undefined) validCount++;
      } else if (q.type === 'fill') {
        if (q.answer) validCount++;
      }
    });

    state.allQuestions = questions;
    state.fileName = file.name;

    // Show preview
    showPreview(questions, rawText, validCount);

  } catch (err) {
    showError('УДБТъљТќЄТАБТЌХтЄ║жћЎ№╝џ' + err.message);
  }
}

// ===================================================================
// PREVIEW
// ===================================================================

function showPreview(questions, rawText, validCount) {
  document.getElementById('loadingArea').style.display = 'none';
  document.getElementById('previewArea').style.display = 'block';

  const total = questions.length;
  const tfCount = questions.filter(q => q.type === 'tf').length;
  const mcCount = questions.filter(q => q.type === 'mc').length;
  const maCount = questions.filter(q => q.type === 'ma').length;
  const fillCount = questions.filter(q => q.type === 'fill').length;

  const typeLabels = [];
  if (tfCount) typeLabels.push(`тѕцТќГ ${tfCount}жбў`);
  if (mcCount) typeLabels.push(`тЇЋжђЅ ${mcCount}жбў`);
  if (maCount) typeLabels.push(`тцџжђЅ ${maCount}жбў`);
  if (fillCount) typeLabels.push(`тАФуЕ║ ${fillCount}жбў`);

  document.getElementById('previewSummary').innerHTML =
    `тЁ▒У»єтѕФ <strong>${total}</strong> жЂЊжбў№╝ѕ${typeLabels.join('№╝ї')}№╝Ѕ` +
    (validCount < total ? ` ┬и <span style="color:#f59e0b;">${total - validCount} жЂЊжбўТюфУ»єтѕФтѕ░уГћТАѕ</span>` : '');

  // List parsed questions
  const list = document.getElementById('parsedList');
  list.innerHTML = questions.map((q, i) => {
    const typeName = { tf:'тѕцТќГ', mc:'тЇЋжђЅ', ma:'тцџжђЅ', fill:'тАФуЕ║' }[q.type] || q.type;
    const typeClass = { tf:'badge-tf', mc:'badge-mc', ma:'badge-ma', fill:'badge-fill' }[q.type] || 'badge-tf';
    const hasAns = q.answer !== null && q.answer !== undefined;
    const firstLine = q.text.split('\n')[0].substring(0, 50);
    return `<div class="parsed-item">
      <span class="num">${i+1}.</span>
      <span class="type-badge ${typeClass}">${typeName}</span>
      <span class="preview">${firstLine}${firstLine.length >= 50 ? '...' : ''}</span>
      <span style="margin-left:auto;font-size:.7rem;color:${hasAns ? '#22c55e' : '#f59e0b'}">${hasAns ? 'Рюћ' : 'Рџа№ИЈ'}</span>
    </div>`;
  }).join('');
}

function getFilteredQuestions() {
  const quizVal = document.getElementById('quizFilter').value;
  let pool = state.allQuestions;
  if (quizVal !== 'all') pool = pool.filter(q => q.quiz === quizVal);

  const checkedTypes = [];
  document.querySelectorAll('#typeFilters .type-filter-label').forEach(l => {
    if (l.querySelector('input').checked) checkedTypes.push(l.dataset.type);
  });
  if (checkedTypes.length > 0 && checkedTypes.length < 4) {
    pool = pool.filter(q => checkedTypes.includes(q.type));
  }
  return pool;
}

function populateFilters() {
  const quizSet = new Set();
  state.allQuestions.forEach(q => { if (q.quiz) quizSet.add(q.quiz); });
  const sel = document.getElementById('quizFilter');
  sel.innerHTML = '<option value="all">тЁежЃетЇЋтЁЃ</option>';
  [...quizSet].sort().forEach(q => {
    const opt = document.createElement('option');
    opt.value = q; opt.textContent = q; sel.appendChild(opt);
  });
  // уѓ╣тЄ╗у▒╗тъІтцЇжђЅТАєТѕќтѕЄТЇбтЇЋтЁЃ Рєњ уФІтЇ│жЄЇТќ░уГЏжђЅ
  document.querySelectorAll('#typeFilters .type-filter-label input').forEach(cb => {
    cb.onchange = function() {
      const label = this.closest('.type-filter-label');
      label.style.opacity = this.checked ? '1' : '.4';
      applyFilters();
    };
  });
  sel.onchange = () => applyFilters();
}

function applyFilters() {
  if (state.history.length > 0) {
    // уЏ┤ТјЦжЄЇТќ░т╝ђтДІ№╝їСИЇт╝╣уА«У«ц
  }
  startNewRound();
}

function startNewRound() {
  cleanupKeyboard();
  const pool = getFilteredQuestions();
  if (pool.length === 0) {
    document.getElementById('quizArea').innerHTML =
      '<div class="question-card" style="text-align:center;padding:40px;color:#6b7280;">Т▓АТюЅугдтљѕТЮАС╗ХуџёжбўуЏ«сђѓ<br>У░ЃТЋ┤уГЏжђЅТЮАС╗Хтљјуѓ╣сђїуГЏжђЅсђЇТїЅжњ«сђѓ</div>';
    updateProgress(); return;
  }
  const questions = clone(pool);
  shuffle(questions);

  questions.forEach(q => {
    if (q.type !== 'tf' && q.options.length > 0) {
      const optIndices = q.options.map((_, i) => i);
      shuffle(optIndices);
      const newOpts = optIndices.map(i => q.options[i]);
      if (q.type === 'mc' && typeof q.answer === 'number') q.answer = optIndices.indexOf(q.answer);
      else if (q.type === 'ma' && Array.isArray(q.answer)) q.answer = q.answer.map(a => optIndices.indexOf(a));
      q.options = newOpts;
    }
  });

  state.roundQuestions = questions;
  state.currentIndex = 0;
  state.answered = false;
  state.correctCount = 0;
  state.wrongCount = 0;
  state.history = [];
  state.startTime = Date.now();

  renderQuestion();
  updateStats();
}

function shuffleAndRestart() {
  if (state.history.length > 0) {
    if (!confirm('тйЊтЅЇУ┐Џт║дт░єСИбтц▒№╝їуА«т«џжЄЇТќ░т╝ђтДІтљЌ№╝Ъ')) return;
  }
  startNewRound();
}

function cleanupKeyboard() {
  const area = document.getElementById('quizArea');
  if (area._cleanup) area._cleanup();
}

function renderQuestion() {
  const area = document.getElementById('quizArea');
  if (area._cleanup) area._cleanup();

  if (state.currentIndex >= state.roundQuestions.length) {
    renderSummary();
    return;
  }

  const q = state.roundQuestions[state.currentIndex];
  const idx = state.currentIndex;
  const total = state.roundQuestions.length;

  const typeLabels = { tf:'тѕцТќГжбў', mc:'тЇЋжђЅжбў', ma:'тцџжђЅжбў', fill:'тАФуЕ║жбў' };
  const badgeClass = { tf:'badge-tf', mc:'badge-mc', ma:'badge-ma', fill:'badge-fill' };

  const mainText = q.text;
  const altText = q.altText || '';

  let html = `<div class="question-card">
    <div class="q-number">угг ${idx+1} жбў / тЁ▒ ${total} жбў</div>
    <span class="q-badge ${badgeClass[q.type]}">${typeLabels[q.type] || q.type}</span>
    <div class="q-text">${mainText}${altText ? `<span class="en">${altText}</span>` : ''}</div>`;

  if (q.type === 'fill') {
    html += `<input type="text" class="fill-input" id="fillInput" placeholder="УЙЊтЁЦуГћТАѕ..." autocomplete="off">`;
  } else {
    html += `<div class="options">`;
    q.options.forEach((opt, oi) => {
      const letter = String.fromCharCode(65 + oi);
      const inputType = q.type === 'ma' ? 'checkbox' : 'radio';
      html += `<label class="option" data-oi="${oi}">
        <input type="${inputType}" name="q${q.id}" value="${oi}">
        <span class="letter">${letter}.</span>
        <span>${opt.text || opt}</span>
      </label>`;
    });
    html += `</div>`;
  }

  html += `<div class="actions">
    <button class="btn-submit" id="submitBtn" onclick="submitAnswer()">ТЈљС║ц</button>
    <button class="btn-next" id="nextBtn" onclick="nextQuestion()" style="${state.answered ? '' : 'display:none'}">${idx+1 >= total ? 'ТЪЦуюІу╗ЊТъю' : 'СИІСИђжбў Рєњ'}</button>
    <button class="btn-reset" onclick="resetCurrent()">жЄЇуй«</button>
  </div>
  <div class="feedback" id="feedback"></div>
  </div>`;

  area.innerHTML = html;
  updateProgress();

  // Auto-focus fill input
  if (q.type === 'fill') {
    setTimeout(() => document.getElementById('fillInput')?.focus(), 100);
  }

  // Keyboard shortcuts
  const handler = (e) => {
    if (e.key === 'Enter') {
      if (e.target?.type === 'text') { submitAnswer(); return; }
      if (!state.answered) { e.preventDefault(); submitAnswer(); }
      else { e.preventDefault(); nextQuestion(); }
      return;
    }
    if (e.key === ' ') {
      if (e.target?.type === 'text') return;
      e.preventDefault();
      if (!state.answered) submitAnswer();
      else nextQuestion();
      return;
    }
    // 1-9 number keys for options
    const n = parseInt(e.key);
    if (n >= 1 && n <= 9 && !state.answered) {
      const opts = document.querySelectorAll('.option');
      if (opts[n-1]) {
        const input = opts[n-1].querySelector('input');
        if (input && !input.disabled) {
          if (input.type === 'checkbox') input.checked = !input.checked;
          else input.checked = true;
        }
      }
    }
    // A-J letter keys
    const li = 'abcdefghij'.indexOf(e.key.toLowerCase());
    if (li >= 0 && !state.answered) {
      const opts = document.querySelectorAll('.option');
      if (opts[li]) {
        const input = opts[li].querySelector('input');
        if (input && !input.disabled) {
          if (input.type === 'checkbox') input.checked = !input.checked;
          else input.checked = true;
        }
      }
    }
  };

  document.addEventListener('keydown', handler);
  const cleanup = () => document.removeEventListener('keydown', handler);
  area._cleanup = cleanup;
}

let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playCorrectSound() {
  try {
    const ctx = getAudioCtx(), now = ctx.currentTime;
    const o1 = ctx.createOscillator(), g1 = ctx.createGain();
    o1.type = 'sine'; o1.frequency.setValueAtTime(523, now); o1.frequency.setValueAtTime(659, now+.06);
    g1.gain.setValueAtTime(0, now); g1.gain.linearRampToValueAtTime(.3, now+.02);
    g1.gain.linearRampToValueAtTime(.15, now+.15); g1.gain.exponentialRampToValueAtTime(.001, now+.4);
    o1.connect(g1); g1.connect(ctx.destination); o1.start(now); o1.stop(now+.4);
    const o2 = ctx.createOscillator(), g2 = ctx.createGain();
    o2.type = 'sine'; o2.frequency.setValueAtTime(659, now+.12); o2.frequency.setValueAtTime(784, now+.18);
    g2.gain.setValueAtTime(0, now); g2.gain.linearRampToValueAtTime(.25, now+.14);
    g2.gain.linearRampToValueAtTime(.12, now+.25); g2.gain.exponentialRampToValueAtTime(.001, now+.5);
    o2.connect(g2); g2.connect(ctx.destination); o2.start(now+.12); o2.stop(now+.5);
  } catch(e) {}
}

function playWrongSound() {
  try {
    const ctx = getAudioCtx(), now = ctx.currentTime;
    const o1 = ctx.createOscillator(), g1 = ctx.createGain();
    o1.type = 'triangle'; o1.frequency.setValueAtTime(300, now); o1.frequency.linearRampToValueAtTime(200, now+.2);
    g1.gain.setValueAtTime(0, now); g1.gain.linearRampToValueAtTime(.2, now+.03);
    g1.gain.exponentialRampToValueAtTime(.001, now+.35); o1.connect(g1); g1.connect(ctx.destination);
    o1.start(now); o1.stop(now+.35);
    const o2 = ctx.createOscillator(), g2 = ctx.createGain();
    o2.type = 'triangle'; o2.frequency.setValueAtTime(250, now+.15); o2.frequency.linearRampToValueAtTime(160, now+.35);
    g2.gain.setValueAtTime(0, now); g2.gain.linearRampToValueAtTime(.15, now+.18);
    g2.gain.exponentialRampToValueAtTime(.001, now+.5); o2.connect(g2); g2.connect(ctx.destination);
    o2.start(now+.15); o2.stop(now+.5);
  } catch(e) {}
}

function spawnParticles(x, y, isCorrect) {

    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist - 30 + 'px');
    document.body.appendChild(p); setTimeout(() => p.remove(), 800);
  }
}

function spawnConfetti(x, y) {
  const colors = ['#22c55e','#4f46e5','#f59e0b','#ef4444','#3b82f6','#ec4899','#14b8a6'];
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div'); p.className = 'confetti-piece';
    p.style.left = x + 'px'; p.style.top = y + 'px';

    p.style.width = (6 + Math.random() * 10) + 'px'; p.style.height = (6 + Math.random() * 10) + 'px';

    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');

function showScorePop(x, y, isCorrect) {

function triggerCardEffect(isCorrect) {
  const card = document.querySelector('.question-card');
  if (!card) return;
  if (isCorrect) {
    card.classList.add('flash-correct', 'pop');
    setTimeout(() => card.classList.remove('flash-correct', 'pop'), 500);
  } else {
    card.classList.add('flash-wrong', 'shaking');
    setTimeout(() => card.classList.remove('flash-wrong', 'shaking'), 600);
  }
}

function triggerFeedback(isCorrect) {
  if (isCorrect) playCorrectSound(); else playWrongSound();
  showFeedbackOverlay(isCorrect);
  triggerCardEffect(isCorrect);
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  if (isCorrect) { spawnConfetti(cx, cy - 60); spawnParticles(cx, cy, true); }
  else { spawnParticles(cx, cy, false); }
  const card = document.querySelector('.question-card');
  if (card) { const r = card.getBoundingClientRect(); showScorePop(r.left + r.width/2, r.top, isCorrect); }
  else { showScorePop(cx, cy - 100, isCorrect); }
}

function submitAnswer() {
  if (state.answered) return;
  const q = state.roundQuestions[state.currentIndex];
  if (!q) return;

  let isCorrect = false;
  let feedbackHtml = '';
  let fbClass = '';

  if (q.type === 'fill') {
    const input = document.getElementById('fillInput');
    if (!input || !input.value.trim()) return;
    const ans = input.value.trim().toLowerCase();
    const expected = String(q.answer).toLowerCase().split(';').map(s => s.trim());
    isCorrect = expected.some(e => ans.includes(e)) || expected.includes(ans);
    fbClass = isCorrect ? 'correct-fb' : 'wrong-fb';
    feedbackHtml = isCorrect ? 'Рюћ ТГБуА«№╝Ђ' : `Рюў жћЎУ»»сђѓТГБуА«уГћТАѕ№╝џ${q.answer}`;
    input.classList.add(isCorrect ? 'correct' : 'wrong');
    input.disabled = true;
    state.answered = true;

  } else {
    const options = document.querySelectorAll('.option');
    const selected = [];
    options.forEach((opt, oi) => {
      if (opt.querySelector('input').checked) selected.push(oi);
    });
    if (selected.length === 0) return;

    if (q.type === 'tf' || q.type === 'mc') {
      const chosenIdx = selected[0];
      isCorrect = chosenIdx === q.answer;

      options.forEach((opt, oi) => {
        opt.classList.remove('selected');
        if (oi === q.answer) opt.classList.add('show-correct');
        if (oi === chosenIdx) opt.classList.add(isCorrect ? 'correct' : 'wrong');
        opt.querySelector('input').disabled = true;
      });

      const correctText = q.options[q.answer]?.text || q.options[q.answer] || '';
      feedbackHtml = isCorrect ? 'Рюћ ТГБуА«№╝Ђ' : `Рюў жћЎУ»»сђѓТГБуА«уГћТАѕТў»№╝џ${correctText.substring(0, 80)}`;
      state.answered = true;

    } else { // MA
      const correctSet = new Set(Array.isArray(q.answer) ? q.answer : [q.answer]);
      const selectedSet = new Set(selected);
      // Correct if: selected == answer set
      isCorrect = selectedSet.size === correctSet.size && [...selectedSet].every(s => correctSet.has(s));

      const correctLetters = [...correctSet].map(i => String.fromCharCode(65 + i)).join(', ');
      feedbackHtml = isCorrect ? 'Рюћ тЁежЃеТГБуА«№╝Ђ' : `Рюў жћЎУ»»сђѓТГБуА«уГћТАѕ№╝џ${correctLetters}`;
      fbClass = isCorrect ? 'correct-fb' : 'wrong-fb';

      options.forEach((opt, oi) => {
        const input = opt.querySelector('input');
        if (input.checked) opt.classList.add('selected');
        if (correctSet.has(oi)) opt.classList.add('show-correct');
        if (input.checked && correctSet.has(oi)) opt.classList.add('correct');
        if (input.checked && !correctSet.has(oi)) opt.classList.add('wrong');
        input.disabled = true;
      });
      state.answered = true;
    }
  }

  // Show feedback
  if (q.type !== 'ma') {
    const fb = document.getElementById('feedback');
    fb.className = `feedback show ${fbClass || (isCorrect ? 'correct-fb' : 'wrong-fb')}`;
    fb.innerHTML = feedbackHtml;
  } else {
    const fb = document.getElementById('feedback');
    fb.className = `feedback show ${fbClass}`;
    fb.innerHTML = feedbackHtml;
  }

  // жЪ│ТЋѕ + тіеућ╗тЈЇждѕ
  triggerFeedback(isCorrect);

  if (isCorrect) state.correctCount++; else state.wrongCount++;
  state.history.push({ index: state.currentIndex, correct: isCorrect });

  // жћЎжбўТюгТеАт╝Ј№╝џуГћт»╣т░▒уД╗жЎц
  if (state.wrongMode && isCorrect) {
    removeWrongFromBank(q.text);
  }

  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = '';
  updateStats();
}

function nextQuestion() {
  state.answered = false;
  state.currentIndex++;
  renderQuestion();
}

function resetCurrent() {
  state.answered = false;
  renderQuestion();
}

function renderSummary() {
  cleanupKeyboard();
  const total = state.history.length;
  const correct = state.correctCount;
  const wrong = state.wrongCount;
  const pct = total > 0 ? Math.round(correct / total * 100) : 0;
  const elapsed = Math.round((Date.now() - state.startTime) / 60000);
  const minLabel = elapsed > 0 ? `${elapsed} тѕєжњЪ` : '<1 тѕєжњЪ';

  let breakdown = '';
  state.history.forEach((h, i) => {
    const q = state.roundQuestions[h.index];
    if (!q) return;
    const icon = h.correct ? 'Рюћ' : 'Рюў';
    const firstLine = (q.text || '').split('\n')[0].substring(0, 60);
    breakdown += `<div class="breakdown-item ${h.correct ? '' : 'wrong-item'}">
      <span style="font-weight:600;${h.correct ? 'color:#22c55e' : 'color:#ef4444'}">${icon}</span>
      <span class="q-preview">${firstLine}${firstLine.length >= 60 ? '...' : ''}</span>
    </div>`;
  });

  const area = document.getElementById('quizArea');

  // УЄфтіетГўжћЎжбўтѕ░жћЎжбўТюг№╝ѕжЮъжћЎжбўТюгТеАт╝Ј№╝Ѕ
  if (!state.wrongMode && wrong > 0) addWrongFromRound();

  // жћЎжбўТюгТеАт╝Ј№╝џуюІуюІУ┐ўтЅЕтцџт░Љ
  const remainingWrong = state.wrongMode ? getWrongQuestions().length : 0;

  area.innerHTML = `<div class="summary-wrap question-card">
    <h2>${state.wrongMode ? '­ЪЊЋ жћЎжбўТюг' : 'уГћжбўт«їТѕљ№╝Ђ'}</h2>
    <div class="score">${pct}%</div>
    <div class="sub">${correct} / ${total} ТГБуА«</div>
    <div class="detail">${state.wrongMode ? `ти▓ТИЁжЎц ${correct} жЂЊжћЎжбў` : `${wrong} жЂЊжћЎУ»»`} ┬и ућеТЌХ ${minLabel}</div>
    ${state.wrongMode && remainingWrong > 0 ? `<div style="margin-top:4px;color:#ef4444;font-size:.9rem;">У┐ўТюЅ ${remainingWrong} жЂЊжћЎжбўТюфТИЁжЎц</div>` : ''}
    ${state.wrongMode && remainingWrong === 0 ? `<div style="margin-top:4px;color:#22c55e;font-size:.9rem;font-weight:600;">­ЪЌЉ№ИЈ жћЎжбўТюгти▓ТИЁуЕ║№╝Ђ</div>` : ''}
    <div class="breakdown">${breakdown}</div>
    <div class="actions" style="justify-content:center;margin-top:20px;flex-wrap:wrap;">
      ${!state.wrongMode && wrong > 0 ? `<button onclick="reviewWrong()" style="padding:12px 24px;background:#ef4444;color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;"> тцЇС╣а ${wrong} жЂЊжћЎжбў</button>` : ''}
      ${state.wrongMode && remainingWrong > 0 ? `<button onclick="shuffleAndRestart()" style="padding:12px 24px;background:#ef4444;color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;">­Ъћё у╗Ду╗ГтѕижћЎжбў</button>` : ''}
      ${state.wrongMode ? `<button onclick="clearWrongBank()" style="padding:12px 24px;background:transparent;color:#ef4444;border:2px solid #ef4444;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;">­ЪЌЉ№ИЈ ТИЁуЕ║жћЎжбўТюг</button>` : ''}
      <button onclick="shuffleAndRestart()" style="padding:12px 32px;background:#1a1a2e;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;"> тєЇТЮЦСИђУй«</button>
      <button onclick="showUpload()" style="padding:12px 32px;background:#6b7280;color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;"> ТЇбТќЄТАБ</button>
    </div>
  </div>`;
  updateProgress();
}

function reviewWrong() {
  cleanupKeyboard();
  const wrongItems = [];
  state.history.forEach(h => {
    if (!h.correct) wrongItems.push(state.roundQuestions[h.index]);
  });
  if (wrongItems.length === 0) return;

  const area = document.getElementById('quizArea');
  const typeLabels = { tf:'тѕцТќГжбў', mc:'тЇЋжђЅжбў', ma:'тцџжђЅжбў', fill:'тАФуЕ║жбў' };
  const badgeClass = { tf:'badge-tf', mc:'badge-mc', ma:'badge-ma', fill:'badge-fill' };

  let html = `<div class="question-card" style="text-align:center;margin-bottom:20px;">
    <h2> жћЎжбўтцЇС╣а</h2>
    <p style="color:#6b7280;margin-top:4px;">тЁ▒ ${wrongItems.length} жЂЊжћЎжбў</p>
    <button onclick="renderSummary()" style="margin-top:12px;padding:10px 24px;background:#6b7280;color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;">Рєљ У┐ћтЏъу╗ЊТъю</button>
  </div>`;

  wrongItems.forEach((q, i) => {
    const mainText = q.text;
    const altText = q.altText || '';

    html += `<div class="question-card">
      <div class="q-number">жћЎжбў ${i+1}</div>
      <span class="q-badge ${badgeClass[q.type] || 'badge-tf'}">${typeLabels[q.type] || q.type}</span>
      <div class="q-text">${mainText}${altText ? `<span class="en">${altText}</span>` : ''}</div>`;

    if (q.type === 'fill') {
      html += `<div style="padding:12px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;">
        <strong>ТГБуА«уГћТАѕ№╝џ</strong>${q.answer}</div>`;
    } else {
      html += `<div class="options">`;
      q.options.forEach((opt, oi) => {
        const isCorrect = q.type === 'ma'
          ? (Array.isArray(q.answer) && q.answer.includes(oi))
          : q.answer === oi;
        const letter = String.fromCharCode(65 + oi);
        html += `<div class="option ${isCorrect ? 'show-correct' : ''}" style="${isCorrect ? '' : 'opacity:.6;'}">
          <span class="letter">${letter}.</span>
          <span>${opt.text || opt}</span>
          ${isCorrect ? '<span style="margin-left:auto;color:#22c55e;font-weight:600;">Рюћ</span>' : ''}
        </div>`;
      });
      html += `</div>`;
    }

    html += `</div>`;
  });

  area.innerHTML = html;
}

// ===================================================================
// DEBUG
// ===================================================================

let debugShown = false;

function showDebug() {
  if (!debugShown) {
    const area = document.getElementById('quizArea');
    const qs = state.roundQuestions;
    let html = `<div class="question-card">
      <h3 style="margin-bottom:8px;">­ЪћЇ Debug С┐АТЂ»</h3>
      <p style="font-size:.8rem;color:#6b7280;margin-bottom:12px;">
        тЁ▒ ${qs.length} жбў№╝їти▓тЏъуГћ ${state.history.length} жбў</p>
      <button onclick="renderSummary()" style="padding:8px 20px;background:#6b7280;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-bottom:16px;">Рєљ У┐ћтЏъ</button>`;

    qs.forEach((q, i) => {
      const ansStr = q.type === 'ma'
        ? (Array.isArray(q.answer) ? q.answer.join(',') : q.answer)
        : q.answer;
      const historyEntry = state.history.find(h => h.index === i);
      const status = historyEntry ? (historyEntry.correct ? 'Рюћ' : 'Рюў') : 'Рђћ';
      const textPreview = (q.text || '').split('\n')[0].substring(0, 40);
      html += `<div style="padding:4px 0;font-size:.75rem;border-bottom:1px solid #374151;">
        <span style="color:#4f46e5">#${i+1}</span>
        <span style="color:#9ca3af">[${q.type}]</span>
        <span>${textPreview}</span>
        <span style="float:right">уГћ:${ansStr} ${status}</span>
      </div>`;
    });

    html += `</div>`;
    area.innerHTML = html;
    debugShown = true;
  } else {
    renderSummary();
    debugShown = false;
  }
}

// ===================================================================
// PROGRESS & STATS
// ===================================================================

function updateProgress() {
  const total = state.roundQuestions.length;
  const done = state.history.length;
  const pct = total > 0 ? (done / total * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
}

function updateStats() {
  const total = state.roundQuestions.length;
  const done = state.history.length;
  const correct = state.correctCount;
  document.getElementById('statsDisplay').textContent =
    total > 0 ? `Рюћ ${correct}/${done} ┬и ${done}/${total}` : '0 / 0';
}

// ===================================================================
// INIT
// ===================================================================

showUpload();
</script>

</html>

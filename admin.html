<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反馈管理 — 刷题工具</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #f0f2f5; color: #1a1a2e;
}
header {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  color: #fff; padding: 20px; text-align: center;
}
header h1 { font-size: 1.3rem; font-weight: 700; }
header p { font-size: .85rem; opacity: .7; margin-top: 4px; }
.container { max-width: 800px; margin: 0 auto; padding: 20px 16px; }

/* Login */
.login-box {
  max-width: 360px; margin: 80px auto; background: #fff;
  border-radius: 14px; padding: 32px; text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
}
.login-box h2 { font-size: 1.1rem; margin-bottom: 16px; }
.login-box input {
  width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb;
  border-radius: 10px; font-size: 1rem; outline: none; margin-bottom: 12px;
}
.login-box input:focus { border-color: #4f46e5; }
.login-box button {
  width: 100%; padding: 12px; border: none; border-radius: 10px;
  background: #4f46e5; color: #fff; font-size: 1rem; font-weight: 600;
  cursor: pointer; transition: .15s;
}
.login-box button:hover { background: #4338ca; }
.login-box .error { color: #ef4444; font-size: .85rem; margin-top: 8px; }

/* Feedback list */
.toolbar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.toolbar .count { font-size: .9rem; color: #6b7280; }
.toolbar button {
  padding: 8px 16px; border-radius: 8px; border: 1px solid #d1d5db;
  font-size: .85rem; cursor: pointer; background: #fff;
}
.toolbar button:hover { background: #f3f4f6; }

.feedback-card {
  background: #fff; border-radius: 12px; padding: 16px 20px;
  margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.06);
  display: flex; gap: 12px; align-items: flex-start;
}
.feedback-card .time {
  font-size: .75rem; color: #9ca3af; white-space: nowrap; min-width: 140px;
}
.feedback-card .text {
  flex: 1; font-size: .9rem; line-height: 1.6; color: #374151;
  white-space: pre-wrap; word-break: break-word;
}
.feedback-card .del-btn {
  padding: 4px 10px; border-radius: 6px; border: 1px solid #fecaca;
  font-size: .75rem; cursor: pointer; background: #fff; color: #ef4444;
  transition: .15s;
}
.feedback-card .del-btn:hover { background: #fef2f2; }
.empty { text-align: center; color: #9ca3af; padding: 60px 0; font-size: .9rem; }
</style>
</head>
<body>

<header>
  <h1>📋 反馈管理</h1>
  <p>刷题工具 — 用户反馈后台</p>
</header>

<div class="container">
  <!-- Login -->
  <div class="login-box" id="loginBox">
    <h2>🔑 管理员验证</h2>
    <input type="password" id="passwordInput" placeholder="输入管理密码" autocomplete="off">
    <button onclick="login()">验证</button>
    <div class="error" id="loginError"></div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" style="display:none">
    <div class="toolbar">
      <span class="count" id="countLabel">共 0 条反馈</span>
      <button onclick="refresh()">🔄 刷新</button>
    </div>
    <div id="feedbackList"></div>
  </div>
</div>

<script>
const API = '/api/feedback';
let password = '';

function login() {
  const pwd = document.getElementById('passwordInput').value;
  if (!pwd) return;
  password = pwd;
  refresh();
}

async function refresh() {
  const list = document.getElementById('feedbackList');
  const loginBox = document.getElementById('loginBox');
  const dashboard = document.getElementById('dashboard');
  const errEl = document.getElementById('loginError');

  try {
    const res = await fetch(`${API}?password=${encodeURIComponent(password)}`);
    if (res.status === 401) {
      errEl.textContent = '密码错误';
      return;
    }
    errEl.textContent = '';
    loginBox.style.display = 'none';
    dashboard.style.display = 'block';

    const data = await res.json();
    document.getElementById('countLabel').textContent = `共 ${data.length} 条反馈`;

    if (data.length === 0) {
      list.innerHTML = '<div class="empty">还没有反馈 ✨</div>';
      return;
    }

    list.innerHTML = data.map(f => `
      <div class="feedback-card">
        <div class="time">${formatTime(f.created_at)}</div>
        <div class="text">${escapeHtml(f.text)}</div>
        <button class="del-btn" onclick="del(${f.id})">删除</button>
      </div>
    `).join('');
  } catch(e) {
    errEl.textContent = '加载失败，请检查网络';
  }
}

async function del(id) {
  if (!confirm('确定删除这条反馈？')) return;
  await fetch(`${API}?id=${id}&password=${encodeURIComponent(password)}`, { method: 'DELETE' });
  refresh();
}

function formatTime(t) {
  const d = new Date(t + 'Z');
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff/60) + '分钟前';
  if (diff < 86400) return Math.floor(diff/3600) + '小时前';
  return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// Enter key to login
document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>

</body>
</html>
